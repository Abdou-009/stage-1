# ============================================================================
# Grafana Dashboard Provider — Auto-Provisioning
# ============================================================================
# WHAT:  Tells Grafana where to find dashboard JSON files.
# WHY:   Dashboards load automatically on startup — no manual import needed.
# ============================================================================

apiVersion: 1

providers:
  - name: "DevOps Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

# ============================================================================
# CI — Continuous Integration Pipeline
# ============================================================================
# WHAT:  Lints code, runs tests, and builds the Docker image.
# WHEN:  Every push or pull request to the main branch.
# WHY:   Catches bugs and style issues BEFORE code reaches production.
# ============================================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest              # GitHub gives us a free Ubuntu VM

    steps:
      # ── Step 1: Download our code onto the VM ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Install Python 3.11 on the VM ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 3: Install all dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8 pytest

      # ── Step 4: Lint — check code style ──
      - name: Lint with flake8
        run: flake8 app/ tests/

      # ── Step 5: Test — run all unit tests ──
      - name: Run tests
        run: pytest tests/ -v

      # ── Step 6: Build — make sure Docker image compiles ──
      - name: Build Docker image
        run: docker build -t devops-api:test .
